methods: Forecasts based on a weekly updated compartmental model (SIR) that re-estimates parameters to reflect changes in ILI%. More recent data is weighted more than older data.  
methods_long: Uses a compartmental model developed in BioNetGenLanguage (BNGL) and parameterized by PyBioNetFit with built-in adaptive MCMC sampling of the parameter posterior to enable bayesian uncertainty quantification.
